name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]" -q
      - run: ruff check src/ tests/

  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]" -q

      # Invariant: scorer + dedup must stay at 100% line coverage.
      - name: Coverage gate (scorer + dedup)
        run: |
          pytest tests/test_scorer.py tests/test_dedup.py \
            --cov=cip.engine.scorer --cov=cip.engine.dedup \
            --cov-report=term-missing --cov-fail-under=100 -q

      # Full suite (all other tests, no coverage requirement).
      - name: Full test suite
        run: pytest tests/ -q

  import-check:
    name: Import smoke test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]" -q
      - name: Verify app and all modules import cleanly
        env:
          CIP_MODE: MOCK
        run: |
          PYTHONPATH=src python -c "
          from cip.app import app
          from cip.engine import scanner, scorer, dedup
          from cip.execution import saga
          from cip.agents import orchestrator
          from cip.api import dashboard, webhooks, ws
          from cip.scheduler import start_scheduler, _auto_renew_pending
          from cip.workflows import p1_escalation, weekly_digest, orphan_reminder, sla_monitor
          print('all imports ok')
          "
